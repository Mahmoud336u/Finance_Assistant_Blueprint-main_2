# ============================================================
# Meridian — Deploy Infrastructure Workflow
# ============================================================
# Runs terraform plan on PRs, terraform apply on merge to main.
# Supports multiple environments via workflow_dispatch.
# ============================================================

name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

  pull_request:
    paths:
      - "infrastructure/**"

concurrency:
  group: deploy-infra-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: infrastructure/terraform/envs/${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan \
            2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/terraform/envs/${{ github.event.inputs.environment || 'dev' }}/plan-output.txt', 'utf8');
            const body = `### Terraform Plan 📋
            \`\`\`
            ${plan.substring(0, 65000)}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Terraform Apply
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') &&
          steps.plan.outcome == 'success'
        run: terraform apply -auto-approve -input=false tfplan

      - name: Terraform Destroy
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.action == 'destroy' &&
          github.event.inputs.environment != 'prod'
        run: |
          echo "⚠️ Destroying infrastructure in ${{ github.event.inputs.environment }}"
          terraform destroy -auto-approve -input=false

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
