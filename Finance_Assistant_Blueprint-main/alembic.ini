# Alembic Configuration File

[alembic]
# Path to migration scripts, relative to this file
script_location = services/api-gateway/migrations

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone to use when generating migration timestamps
timezone = UTC

# Truncate revision hash to this many characters
truncate_slug_length = 40

# Set to 'true' to run each migration in a transaction
transaction_per_migration = true

# Database URL — overridden by env.py from Settings
sqlalchemy.url = postgresql+asyncpg://meridian:changeme@localhost:5432/meridian

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
